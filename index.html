<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#07080C" />
    <meta name="color-scheme" content="dark" />
    <meta
      name="description"
      content="Drop&Go — мгновенный P2P обмен сообщениями и файлами без регистрации. Создай комнату — продиктуй код другу."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
    <title>Drop&Go — P2P messenger</title>
    <script>
      // One-time cleanup for users who previously installed the PWA service
      // worker. The SW was caching old bundles and forcing peers onto stale
      // signalling protocols, breaking new rooms. Strip any leftover SW
      // registrations and their caches on every load until we're sure the
      // legacy worker is gone from real-user devices.
      //
      // IMPORTANT: just unregistering the SW and clearing caches is not
      // enough on the *current* page load — by the time the SW is gone, the
      // browser has already served the stale `index.html` (and its imported
      // JS bundles) from the SW cache. The user is now running pre-Trystero
      // code that will never see a peer using the new signalling, and after
      // 18s they get "Комната недоступна". To recover on the same visit we
      // force one reload after cleanup so the next request bypasses the
      // dying SW and fetches a fresh bundle from the network. A
      // `sessionStorage` flag prevents an infinite reload loop on browsers
      // with no SW to clean up.
      (function () {
        try {
          if (sessionStorage.getItem('dg-sw-killswitch') === '1') return
        } catch (_) {
          return
        }
        var needsReload = false
        var pending = []
        if ('serviceWorker' in navigator) {
          pending.push(
            navigator.serviceWorker
              .getRegistrations()
              .then(function (regs) {
                if (regs && regs.length) needsReload = true
                return Promise.all(
                  (regs || []).map(function (reg) {
                    return reg.unregister()
                  }),
                )
              })
              .catch(function () {}),
          )
        }
        if (typeof caches !== 'undefined' && caches.keys) {
          pending.push(
            caches
              .keys()
              .then(function (keys) {
                if (keys && keys.length) needsReload = true
                return Promise.all(
                  (keys || []).map(function (k) {
                    return caches.delete(k)
                  }),
                )
              })
              .catch(function () {}),
          )
        }
        if (!pending.length) return
        Promise.all(pending).then(function () {
          if (!needsReload) return
          try {
            sessionStorage.setItem('dg-sw-killswitch', '1')
          } catch (_) {
            // If sessionStorage is unavailable we can't guard against a
            // loop, so don't reload.
            return
          }
          location.reload()
        })
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
