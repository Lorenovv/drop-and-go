<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#07080C" />
    <meta name="color-scheme" content="dark" />
    <meta
      name="description"
      content="Drop&Go — мгновенный P2P обмен сообщениями и файлами без регистрации. Создай комнату — продиктуй код другу."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
    <title>Drop&Go — P2P messenger</title>
    <script>
      // One-time cleanup for users who previously installed the PWA service
      // worker. The SW was caching old bundles and forcing peers onto stale
      // signalling protocols, breaking new rooms. Strip any leftover SW
      // registrations and their caches on every load until we're sure the
      // legacy worker is gone from real-user devices.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker
          .getRegistrations()
          .then((regs) => regs.forEach((reg) => reg.unregister()))
          .catch(() => {})
      }
      if (typeof caches !== 'undefined' && caches.keys) {
        caches
          .keys()
          .then((keys) => Promise.all(keys.map((k) => caches.delete(k))))
          .catch(() => {})
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
